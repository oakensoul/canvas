repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        # Keep in sync with [project] dependencies in pyproject.toml
        additional_dependencies:
          - click>=8.0
          - rich>=13.0
          - jinja2>=3.1
        args: [canvas]
        pass_filenames: false
